<!DOCTYPE html>
<html>
<head>
    <title>パスワード変更</title>
</head>
<body>
    <h2>パスワード変更</h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul>
          {% for msg in messages %}
            <li>{{ msg }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <form method="POST">
        <label>新しいパスワード：</label>
        <input type="password" name="new_password"><br>

        <button type="submit">変更</button>
    </form>
</body>
</html>
