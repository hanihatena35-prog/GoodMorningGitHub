<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワード変更</title>
    <style>
        /* PC向け（デフォルト）*/
        body {
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        h2 {
            color: #433194;
            margin-bottom: 20px;
        }

        ul {
            margin-bottom: 20px;
            color: #d9534f;
            padding-left: 20px;
        }

        li {
            margin-bottom: 10px;
        }

        form {
            max-width: 500px;
            margin-top: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        input[type="password"] {
            width: 20em;
            max-width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1em;
            box-sizing: border-box;
        }

        button {
            padding: 10px 20px;
            margin-right: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        button[type="reset"] {
            background-color: #6c757d;
        }

        button[type="reset"]:hover {
            background-color: #5a6268;
        }

        a {
            display: inline-block;
            padding: 10px 20px;
            margin-top: 15px;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            transition: background-color 0.3s;
        }

        a:hover {
            background-color: #218838;
        }

        /* スマートフォン向け（縦長レイアウト）*/
        @media screen and (max-width: 600px) {
            body {
                padding: 15px;
            }

            h2 {
                font-size: 1.5em;
            }

            form {
                max-width: 100%;
            }

            input[type="password"] {
                width: 100%;
            }

            button {
                display: block;
                width: 100%;
                margin-right: 0;
                margin-bottom: 10px;
            }

            a {
                display: block;
                width: 100%;
                text-align: center;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>
    <h2>パスワード変更</h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul>
          {% for msg in messages %}
            <li>{{ msg }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <form method="POST" onsubmit="validateForm(event)">
        <div class="form-group">
            <label>現在のパスワード：</label>
            <input type="password" id="current_password" name="current_password" maxlength="15" required>
        </div>

        <div class="form-group">
            <label>新しいパスワード：</label>
            <input type="password" id="new_password" name="new_password" maxlength="15" required>
        </div>

        <div class="form-group">
            <label>確認用パスワード：</label>
            <input type="password" id="confirm_password" name="confirm_password" maxlength="15" required>
        </div>

        <button type="submit">変更</button>
        <button type="reset">クリア</button>
    </form>

    <script>
        function validateForm(event) {
            const currentPassword = document.getElementById("current_password").value;
            const newPassword = document.getElementById("new_password").value;
            const confirmPassword = document.getElementById("confirm_password").value;

            // 新しいパスワードと確認用パスワードの一致確認
            if (newPassword !== confirmPassword) {
                alert("新しいパスワードと確認用パスワードが一致しません");
                event.preventDefault();
                return false;
            }

            // 新旧パスワードが同じでないか確認
            if (newPassword === currentPassword) {
                alert("新しいパスワードは現在のパスワードと異なるものを設定してください");
                event.preventDefault();
                return false;
            }

            return true;
        }
    </script>

    <script>
        function validateForm(event) {
            const currentPassword = document.getElementById("current_password").value;
            const newPassword = document.getElementById("new_password").value;
            const confirmPassword = document.getElementById("confirm_password").value;

            // 新しいパスワードと確認用パスワードの一致確認
            if (newPassword !== confirmPassword) {
                alert("新しいパスワードと確認用パスワードが一致しません");
                event.preventDefault();
                return false;
            }

            // 新旧パスワードが同じでないか確認
            if (newPassword === currentPassword) {
                alert("新しいパスワードは現在のパスワードと異なるものを設定してください");
                event.preventDefault();
                return false;
            }

            return true;
        }
    </script>

    <a href="/">ホームに戻る</a>
</body>
</html>
