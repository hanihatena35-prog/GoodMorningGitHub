<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ホーム</title>
    <style>
        /* PC向け（デフォルト）*/
        body {
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        h2 {
            color: #433194;
            margin-bottom: 20px;
        }

        ul {
            margin-bottom: 20px;
        }

        li {
            margin-bottom: 10px;
        }

        a {
            display: inline-block;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            margin-top: 10px;
            transition: background-color 0.3s;
        }

        a:hover {
            background-color: #0056b3;
        }

        /* スマートフォン向け（縦長レイアウト）*/
        @media screen and (max-width: 600px) {
            body {
                padding: 15px;
            }

            h2 {
                font-size: 1.5em;
            }

            a {
                display: block;
                width: 100%;
                text-align: center;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>
    <h2>ホーム画面</h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul>
          {% for msg in messages %}
            <li>{{ msg }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <p>ログイン成功</p>
    <a href="/change_password">パスワード変更</a>
</body>
</html>
