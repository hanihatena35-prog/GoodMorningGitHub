<!DOCTYPE html>
<html>
<head>
    <title>ホーム</title>
</head>
<body>
    <h2>ホーム画面</h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul>
          {% for msg in messages %}
            <li>{{ msg }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <p>ログイン成功</p>
    <a href="/change_password">パスワード変更</a>
</body>
</html>
