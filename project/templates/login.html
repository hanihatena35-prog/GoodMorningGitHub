<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン</title>
    <style>
       /* 入力欄の基本スタイル　*/
       input[type="text"],
       input[type="password"] {
          padding: 6px;
          margin-bottom: 10px;
       }
       
       /* PC向け（デフォルト）*/
       .username-input {
          width: 20em;    /* 全角20文字相当 */
          max-width: 100%;
       }

       .password-input {
          width: 15em;  /* 全角15文字相当 */
          max-width: 100%;
       }

       button {
          padding: 10px 20px;
          margin-right: 10px;
          background-color: #007bff;
          color: white;
          border: none;
          border-radius: 4px;
          cursor: pointer;
          font-size: 1em;
          transition: background-color 0.3s;
       }

       button:hover {
          background-color: #0056b3;
       }

       button[type="reset"] {
          background-color: #6c757d;
       }

       button[type="reset"]:hover {
          background-color: #5a6268;
       }

       /* スマートフォン向け（縦長レイアウト） */
       @media screen and (max-width: 600px) {
        body {
          display: flex;
          flex-direction: column;
          align-items: center;
          padding: 20px;
        } 

        form {
          width: 100%;
          max-width: 300px;        
        }

        input[type="text"],
        input[type="password"] {
          width: 100%;  /* 画面いっぱい */
        }

        button {
          display: block;
          width: 100%;
          margin-right: 0;
          margin-bottom: 10px;
        }
       }
    </style>
</head>
<body>
    <h2>ログイン</h2>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul>
          {% for msg in messages %}
            <li>{{ msg }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <form method="POST">
        <label>ユーザー名：</label><br>
        <input type="text" name="username" class="username-input" maxlength="20"><br>
        <label>パスワード：</label><br>
        <input type="password" name="password" class="password-input" maxlength="15"><br>

        <button type="submit">ログイン</button>
        <button type="reset">クリア</button>
    </form>
</body>
</html>
