<!DOCTYPE html>
<html>
<head>
    <title>ログイン</title>
</head>
<body>
    <h2>ログイン</h2>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul>
          {% for msg in messages %}
            <li>{{ msg }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <form method="POST">
        <label>ユーザー名：</label>
        <input type="text" name="username"><br>

        <label>パスワード：</label>
        <input type="password" name="password"><br>

        <button type="submit">ログイン</button>
        <button type="submit">キャンセル</button>
    </form>
</body>
</html>
